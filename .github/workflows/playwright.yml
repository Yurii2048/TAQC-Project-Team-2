name: Playwright Tests + Allure Report
 
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
 
permissions:
  contents: write
  pages: write
  id-token: write
 
jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
 
      - name: Run Playwright tests
        run: npm test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          LOGIN: ${{ secrets.LOGIN }}
          PASSWORD: ${{ secrets.PASSWORD }}
          HEADLESS: ${{ secrets.HEADLESS }}
          RETRIES: ${{ secrets.RETRIES }}
          TIMEOUT: ${{ secrets.TIMEOUT }}
          CI: true
        continue-on-error: true
 
      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
 
      - name: Upload Playwright trace on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
 
  deploy-report:
    name: Deploy Allure Report to GitHub Pages
    needs: test
    if: always() && github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Download allure-results artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/
 
      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
 
      - name: Copy history for trend graphs
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/. allure-results/history/
          fi
 
      - name: Install Allure CLI
        run: npm install -g allure-commandline
 
      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report
 
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          force_orphan: false
